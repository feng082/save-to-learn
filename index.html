<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>save-to-learn · 学习素材库</title>
  <style>
    :root {
      --bg: #f5f1e9;
      --paper: #fffdf8;
      --ink: #201f1c;
      --muted: #7d776d;
      --line: #e7dfd2;
      --accent: #b33e38;
      --gold: #b58b45;
      --shadow: 0 14px 40px rgba(61, 48, 33, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: radial-gradient(circle at 10% 0%, #fffdf8 0, var(--bg) 42%, #eee8dc 100%);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }
    a { color: inherit; }
    .shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 42px 0 64px; }
    header { display: flex; justify-content: space-between; gap: 24px; align-items: end; margin-bottom: 28px; }
    .eyebrow { color: var(--accent); font-size: 13px; font-weight: 700; letter-spacing: .15em; margin-bottom: 10px; }
    h1 { margin: 0; font-size: clamp(34px, 5vw, 62px); letter-spacing: -.06em; line-height: 1; }
    .intro { max-width: 570px; color: var(--muted); line-height: 1.8; margin: 16px 0 0; }
    .count { text-align: right; color: var(--muted); font-size: 13px; white-space: nowrap; }
    .count strong { display: block; color: var(--ink); font-size: 42px; letter-spacing: -.06em; line-height: 1; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 22px; }
    .search { flex: 1 1 280px; position: relative; }
    .search input {
      width: 100%; border: 1px solid var(--line); border-radius: 14px; background: rgba(255,253,248,.88);
      padding: 13px 16px 13px 42px; font: inherit; color: var(--ink); outline: none;
    }
    .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(179,62,56,.1); }
    .search span { position: absolute; left: 15px; top: 12px; color: var(--muted); }
    .filter { border: 1px solid var(--line); color: var(--muted); background: rgba(255,253,248,.78); border-radius: 999px; padding: 10px 14px; cursor: pointer; font: inherit; }
    .filter.active, .filter:hover { color: #fff; background: var(--ink); border-color: var(--ink); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 18px; }
    .card {
      display: flex; flex-direction: column; min-height: 340px; background: rgba(255,253,248,.92); border: 1px solid var(--line);
      border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); transition: transform .2s ease, box-shadow .2s ease;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 18px 48px rgba(61,48,33,.14); }
    .cover { min-height: 130px; padding: 18px; display: flex; justify-content: space-between; align-items: start; background: linear-gradient(135deg, #282521, #5d5549); color: #fff; position: relative; overflow: hidden; }
    .cover::after { content: ""; position: absolute; width: 180px; height: 180px; border: 1px solid rgba(255,255,255,.16); border-radius: 50%; right: -45px; bottom: -95px; box-shadow: 0 0 0 22px rgba(255,255,255,.04), 0 0 0 44px rgba(255,255,255,.04); }
    .card:nth-child(2n) .cover { background: linear-gradient(135deg, #7a332f, #c77b60); }
    .card:nth-child(3n) .cover { background: linear-gradient(135deg, #6b5731, #c6a76d); }
    .type { font-size: 12px; border: 1px solid rgba(255,255,255,.45); padding: 6px 9px; border-radius: 999px; position: relative; z-index: 1; }
    .cover-mark { font-size: 58px; font-weight: 800; letter-spacing: -.1em; line-height: .9; opacity: .2; position: relative; z-index: 1; }
    .content { display: flex; flex: 1; flex-direction: column; padding: 20px; }
    .meta { display: flex; justify-content: space-between; gap: 10px; color: var(--muted); font-size: 12px; }
    h2 { margin: 12px 0 10px; font-size: 21px; letter-spacing: -.035em; line-height: 1.35; }
    .summary { color: #5d584f; line-height: 1.75; font-size: 14px; margin: 0 0 16px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; margin-bottom: 18px; }
    .tag { color: var(--accent); background: #f9e9e4; border-radius: 6px; padding: 5px 8px; font-size: 12px; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .button { display: inline-flex; align-items: center; justify-content: center; min-height: 38px; padding: 8px 12px; border-radius: 10px; text-decoration: none; border: 1px solid var(--line); color: var(--ink); font-size: 13px; background: #fff; }
    .button.primary { color: #fff; background: var(--accent); border-color: var(--accent); }
    .button:hover { filter: brightness(.96); transform: translateY(-1px); }
    .empty { grid-column: 1/-1; text-align: center; color: var(--muted); padding: 60px 20px; border: 1px dashed var(--line); border-radius: 16px; }
    footer { color: var(--muted); border-top: 1px solid var(--line); margin-top: 34px; padding-top: 18px; font-size: 13px; line-height: 1.7; }
    code { background: #eee8dc; border-radius: 5px; padding: 2px 5px; }
    @media (max-width: 680px) { .shell { width: min(100% - 22px, 1180px); padding-top: 28px; } header { display: block; } .count { text-align: left; margin-top: 18px; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <div class="eyebrow">SAVE TO LEARN · LOCAL LIBRARY</div>
        <h1>学习素材库</h1>
        <p class="intro">把网上和本地发现的好内容，变成可以再次打开、拆解、复用的素材。点击卡片里的按钮，即可查看分析报告或打开原始素材。</p>
      </div>
      <div class="count"><strong id="total">0</strong>份已收录素材</div>
    </header>

    <section class="toolbar" aria-label="素材筛选">
      <label class="search"><span>⌕</span><input id="search" type="search" placeholder="搜索标题、标签、来源……"></label>
      <button class="filter active" data-filter="全部">全部</button>
      <button class="filter" data-filter="视频">视频</button>
      <button class="filter" data-filter="组合素材">组合素材</button>
      <button class="filter" data-filter="X文章">X文章</button>
      <button class="filter" data-filter="X帖子">X帖子</button>
    </section>

    <section id="grid" class="grid" aria-live="polite"></section>

    <footer>
      这是 save-to-learn 的公开展示页。以后新增素材时，在下方脚本的 <code>materials</code> 数组增加一条记录，并把公开报告放入 <code>reports</code> 即可。
    </footer>
  </main>

  <script>
    const materials = [
      {
        date: "2026-07-18", type: "视频", title: "0-1万粉到底难不难？难在哪儿？", source: "抖音", rating: "4星", mark: "01",
        tags: ["自媒体", "短视频", "涨粉", "爆款", "选题学习", "账号冷启动"],
        summary: "用“大雄做自媒体”的故事说明：0-1万粉难在缺少爆款杠杆，解决方向是找到高度相似账号，做深度拆解与连续试错。",
        report: "reports/2026-07-18_视频_0-1万粉到底难不难.md",
        sourceLinks: [{ label: "打开抖音链接", href: "https://v.douyin.com/IpZMOWyrXTI/", external: true }]
      },
      {
        date: "2026-07-17", type: "X帖子", title: "小红书爆款封面设计 Skill", source: "X", rating: "5星", mark: "X",
        tags: ["小红书", "封面设计", "AI生图", "Skill", "提示词", "Codex"], summary: "把文章交给 Agent，经过三轮问答生成 3:4 小红书封面提示词，包含构图、安全区、多参考图和标题校对流程。",
        report: "reports/2026-07-17_X帖子_待核实_2077941050652623196.md",
        sourceLinks: [{ label: "打开 X 原文", href: "https://x.com/i/status/2077941050652623196", external: true }]
      },
      {
        date: "2026-07-17", type: "组合素材", title: "职场故事视频工作流脚本与成片对照", source: "本地文件", rating: "5星", mark: "02",
        tags: ["职场故事", "AI视频", "HyperFrames", "极简信息图", "音画同步", "成片复盘"],
        summary: "把制作工作流文稿与 60 秒竖屏成片放在一起，复盘危机、卡顿、尝试、破局、冲刺和结果如何被视觉化。",
        report: "reports/2026-07-17_组合素材_职场故事视频工作流对照.md",
        sourceLinks: [{ label: "查看公开复盘", href: "reports/2026-07-17_组合素材_职场故事视频工作流对照.md" }]
      },
      {
        date: "2026-07-17", type: "X文章", title: "AI视频制作流程与 Skill", source: "X", rating: "5星", mark: "03",
        tags: ["AI视频", "Remotion", "HyperFrames", "字幕驱动", "音画同步", "Skill", "素材库"],
        summary: "围绕 AI 视频生产、字幕驱动、音画同步和 Skill 工作流，整理为可复用的制作方法与素材库思路。",
        report: "reports/2026-07-17_X帖子_泊舟分享文章待核实.md",
        sourceLinks: [{ label: "打开 X 原文", href: "https://x.com/bozhou_ai/status/2074790399789732348", external: true }]
      },
      {
        date: "2026-07-17", type: "X帖子", title: "Codex + Skill 制作数字人", source: "X", rating: "4星", mark: "04",
        tags: ["X", "数字人", "Codex", "Skill", "CosyVoice", "视频制作"],
        summary: "围绕 Codex、Skill、数字人和语音工具的组合使用，记录可继续验证的制作方向。",
        report: "reports/2026-07-17_X帖子_kanvis_chen动态待核实.md",
        sourceLinks: [{ label: "打开 X 原文", href: "https://x.com/kanvis_chen/status/2077729786974388261?s=20", external: true }]
      }
    ];

    const grid = document.querySelector('#grid');
    const search = document.querySelector('#search');
    const total = document.querySelector('#total');
    let activeFilter = '全部';

    function esc(value) {
      return String(value).replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));
    }

    function render() {
      const query = search.value.trim().toLowerCase();
      const list = materials.filter(item => {
        const matchesFilter = activeFilter === '全部' || item.type === activeFilter;
        const haystack = [item.title, item.type, item.source, item.tags.join(' ')].join(' ').toLowerCase();
        return matchesFilter && (!query || haystack.includes(query));
      });
      total.textContent = materials.length;
      grid.innerHTML = list.length ? list.map(item => {
        const buttons = item.sourceLinks.map(link => `<a class="button" href="${link.href}" ${link.external ? 'target="_blank" rel="noopener"' : ''}>${link.video ? '▶ ' : ''}${esc(link.label)}</a>`).join('');
        return `<article class="card">
          <div class="cover"><span class="type">${esc(item.type)} · ${esc(item.source)}</span><span class="cover-mark">${esc(item.mark)}</span></div>
          <div class="content">
            <div class="meta"><span>${esc(item.date)}</span><span>推荐 ${esc(item.rating)}</span></div>
            <h2>${esc(item.title)}</h2>
            <p class="summary">${esc(item.summary)}</p>
            <div class="tags">${item.tags.map(tag => `<span class="tag">#${esc(tag)}</span>`).join('')}</div>
            <div class="actions"><a class="button primary" href="${item.report}" target="_blank">查看分析报告</a>${buttons}</div>
          </div>
        </article>`;
      }).join('') : '<div class="empty">没有找到匹配的素材。试试换一个关键词或切换分类。</div>';
    }

    document.querySelectorAll('.filter').forEach(button => button.addEventListener('click', () => {
      activeFilter = button.dataset.filter;
      document.querySelectorAll('.filter').forEach(item => item.classList.toggle('active', item === button));
      render();
    }));
    search.addEventListener('input', render);
    render();
  </script>
</body>
</html>
